<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KV Cache Cluster - Cache</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e0e0e0;padding:20px}
.container{max-width:1400px;margin:0 auto}
nav{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #1e2a3a;margin-bottom:24px}
nav .logo{font-size:1.2rem;font-weight:700;color:#58a6ff}
nav a{color:#8b949e;text-decoration:none;padding:6px 14px;border-radius:6px;font-size:0.9rem}
nav a.active,nav a:hover{color:#fff;background:#1e2a3a}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#111b2e;border:1px solid #1e2a3a;border-radius:10px;padding:20px;text-align:center}
.card small{color:#8b949e;font-size:0.8rem}
.card h2{margin:8px 0 0;font-size:1.8rem;color:#f0f6fc}
.panel{background:#111b2e;border:1px solid #1e2a3a;border-radius:10px;overflow:hidden;margin-bottom:24px}
.panel-header{padding:14px 20px;border-bottom:1px solid #1e2a3a;font-weight:600;color:#f0f6fc}
table{width:100%;border-collapse:collapse;font-size:0.9rem}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #1a2538}
th{color:#8b949e;font-weight:600;font-size:0.8rem;text-transform:uppercase}
tr:hover{background:#162033}
.disk-mini{font-size:0.75rem;color:#8b949e;white-space:nowrap}
.empty{text-align:center;padding:40px;color:#8b949e}
hgroup{margin-bottom:20px}
hgroup h2{color:#f0f6fc}
hgroup p{color:#8b949e;font-size:0.9rem}
a{color:#58a6ff;text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
  <nav>
    <div class="logo">⚡ KV Cache Cluster Manager</div>
    <div>
      <a href="/">Dashboard</a>
      <a href="/nodes.html">Nodes</a>
      <a href="/cache.html" class="active">Cache</a>
      <a href="/commands.html">Commands</a>
    </div>
  </nav>
  <hgroup><h2>📊 KV Cache Analytics</h2><p>Cluster-wide cache statistics</p></hgroup>
  <div class="cards" id="summary-cards">
    <div class="card"><small>Total Blocks</small><h2>—</h2></div>
    <div class="card"><small>Total Size</small><h2>—</h2></div>
    <div class="card"><small>Cache Mode</small><h2>—</h2></div>
    <div class="card"><small>Hit Rate</small><h2>—</h2></div>
  </div>
  <div class="panel">
    <div class="panel-header">Cache per Node</div>
    <table>
      <thead><tr><th>Node</th><th>Blocks</th><th>Hit Rate</th><th>Disks</th></tr></thead>
      <tbody id="cache-tbody"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
</div>
<script>
async function load(){
  try{
    const r=await fetch('/api/v1/cluster/status');
    const d=await r.json();
    const cards=document.getElementById('summary-cards').children;
    cards[0].querySelector('h2').textContent=(d.total_blocks||0).toLocaleString();
    cards[1].querySelector('h2').textContent=fmtBytes(d.total_bytes||0);
    cards[2].querySelector('h2').textContent=d.cache_mode||'—';
    cards[3].querySelector('h2').textContent=(d.hit_rate||0).toFixed(1)+'%';
    const tb=document.getElementById('cache-tbody');
    if(!d.nodes||!d.nodes.length){tb.innerHTML='<tr><td colspan="4" class="empty">No data</td></tr>';return}
    tb.innerHTML=d.nodes.map(n=>'<tr><td>'+esc(n.node_id)+'</td><td>'+(n.cache_blocks||0).toLocaleString()+'</td><td>'+(n.hit_rate||0).toFixed(1)+'%</td><td>'+(n.disks||[]).map(d=>'<div class="disk-mini">'+esc(d.path)+': '+(d.free_gb/1024).toFixed(1)+'TB free</div>').join('')+'</td></tr>').join('');
  }catch(e){console.error(e)}
}
function fmtBytes(b){if(!b)return'0';const u=['B','KB','MB','GB','TB'];let i=0;let v=b;while(v>=1024&&i<u.length-1){v/=1024;i++}return v.toFixed(1)+u[i]}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
load();
</script>
</body>
</html>
