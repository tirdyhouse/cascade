<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>KV Cache Cluster - Commands</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body x-data="commandsPage()" x-init="init()">
  <main class="container">
    <nav>
      <ul><li><strong>⚡ KV Cache Cluster Manager</strong></li></ul>
      <ul>
        <li><a href="/">Dashboard</a></li>
        <li><a href="/nodes.html">Nodes</a></li>
        <li><a href="/cache.html">Cache</a></li>
        <li><a href="/commands.html" class="active">Commands</a></li>
      </ul>
    </nav>

    <hgroup>
      <h2>⚙️ Command Dispatch</h2>
      <p>Send operations to C端 agents across the cluster</p>
    </hgroup>

    <!-- Dispatch Form -->
    <article>
      <header><strong>Send Command</strong></header>
      <form @submit.prevent="dispatch()">
        <div class="grid">
          <label>Action
            <select x-model="form.action">
              <option value="start_vllm">start_vllm</option>
              <option value="stop_vllm">stop_vllm</option>
              <option value="restart_vllm">restart_vllm</option>
              <option value="load_model">load_model</option>
              <option value="unload_model">unload_model</option>
              <option value="exec_shell">exec_shell</option>
            </select>
          </label>
          <label>Target Node
            <select x-model="form.target">
              <option value="*">* Broadcast (all nodes)</option>
              <template x-for="n in nodes">
                <option :value="n.node_id" x-text="n.node_id + ' (' + n.ip + ')'"></option>
              </template>
            </select>
          </label>
        </div>
        <label>Params (JSON key-value)
          <textarea x-model="form.params" rows="3" placeholder='{"model":"Qwen-72B","gpu_util":"0.9"}'></textarea>
        </label>
        <div class="grid">
          <label>Timeout (seconds)
            <input type="number" x-model="form.timeout" value="300">
          </label>
          <div><br><button type="submit">🚀 Send</button></div>
        </div>
        <template x-if="dispatchResult">
          <p :class="dispatchResult.ok ? 'success' : 'error'" x-text="dispatchResult.ok ? '✅ Command dispatched' : '❌ ' + dispatchResult.err"></p>
        </template>
      </form>
    </article>

    <!-- Command History -->
    <article>
      <header><strong>📜 Command History</strong></header>
      <div class="overflow-auto">
        <table>
          <thead><tr><th>Cmd ID</th><th>Node</th><th>Status</th><th>Output</th><th>Error</th></tr></thead>
          <tbody>
            <template x-for="cmd in history" :key="cmd.cmd_id">
              <tr>
                <td x-text="cmd.cmd_id"></td>
                <td x-text="cmd.node_id"></td>
                <td><span :class="'tag ' + cmd.status" x-text="cmd.status"></span></td>
                <td x-text="cmd.output || '—'" class="mono"></td>
                <td x-text="cmd.error || '—'" class="mono error-text"></td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </article>
  </main>

  <script>
    function commandsPage() {
      return {
        form: { action: 'start_vllm', target: '*', params: '{}', timeout: 300 },
        nodes: [],
        history: [],
        dispatchResult: null,
        async init() {
          const [n, h] = await Promise.all([
            fetch('/api/v1/nodes').then(r => r.json()),
            fetch('/api/v1/commands').then(r => r.json())
          ]);
          this.nodes = n;
          this.history = h;
        },
        async dispatch() {
          let params;
          try { params = JSON.parse(this.form.params); } catch { params = {}; }
          const r = await fetch('/api/v1/command', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              action: this.form.action,
              target: this.form.target,
              params: params,
              timeout: this.form.timeout
            })
          });
          this.dispatchResult = await r.json();
          // Refresh history
          const h = await fetch('/api/v1/commands').then(r => r.json());
          this.history = h;
        }
      }
    }
  </script>
</body>
</html>
