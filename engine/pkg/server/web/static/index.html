<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KV Cache Cluster Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e0e0e0;padding:20px}
.container{max-width:1400px;margin:0 auto}
nav{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #1e2a3a;margin-bottom:24px}
nav .logo{font-size:1.2rem;font-weight:700;color:#58a6ff}
nav a{color:#8b949e;text-decoration:none;padding:6px 14px;border-radius:6px;font-size:0.9rem}
nav a.active,nav a:hover{color:#fff;background:#1e2a3a}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#111b2e;border:1px solid #1e2a3a;border-radius:10px;padding:20px;text-align:center}
.card small{color:#8b949e;font-size:0.8rem}
.card h2{margin:8px 0 0;font-size:1.8rem;color:#f0f6fc}
.panel{background:#111b2e;border:1px solid #1e2a3a;border-radius:10px;overflow:hidden;margin-bottom:24px}
.panel-header{padding:14px 20px;border-bottom:1px solid #1e2a3a;font-weight:600;color:#f0f6fc}
table{width:100%;border-collapse:collapse;font-size:0.9rem}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #1a2538}
th{color:#8b949e;font-weight:600;font-size:0.8rem;text-transform:uppercase}
tr:hover{background:#162033}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.75rem;font-weight:600}
.tag.online,.tag.running,.tag.success{background:#0d4420;color:#7ee8a0}
.tag.offline,.tag.stopped,.tag.error,.tag.failed{background:#441d0d;color:#f7a072}
.tag.loading{background:#443d0d;color:#f0d76e}
.disk-mini{font-size:0.75rem;color:#8b949e;white-space:nowrap}
.empty{text-align:center;padding:40px;color:#8b949e}
.footer{text-align:center;padding:20px;color:#555;font-size:0.8rem}
.btn{display:inline-block;background:#1f6feb;color:#fff;padding:6px 14px;border-radius:6px;text-decoration:none;font-size:0.85rem}
.btn:hover{background:#3b82f6;text-decoration:none}
a{color:#58a6ff;text-decoration:none}
a:hover{text-decoration:underline}
input,select,textarea{background:#0a0e17;border:1px solid #1e2a3a;color:#e0e0e0;padding:8px 12px;border-radius:6px;width:100%;font-size:0.9rem;box-sizing:border-box}
label{display:block;margin-bottom:4px;color:#8b949e;font-size:0.85rem}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.success-msg{color:#7ee8a0;margin-top:8px}
.error-msg{color:#f7a072;margin-top:8px}
progress{width:100%;height:12px;border-radius:6px}
progress::-webkit-progress-bar{background:#1a2538;border-radius:6px}
progress::-webkit-progress-value{background:#1f6feb;border-radius:6px}
.mono{font-family:'SF Mono',Consolas,monospace;font-size:0.8rem}
hgroup{margin-bottom:20px}
hgroup h2{color:#f0f6fc}
hgroup p{color:#8b949e;font-size:0.9rem}
</style>
</head>
<body>
<div class="container">
  <nav>
    <div class="logo">⚡ KV Cache Cluster Manager</div>
    <div>
      <a href="/" class="active">Dashboard</a>
      <a href="/nodes.html">Nodes</a>
      <a href="/cache.html">Cache</a>
      <a href="/commands.html">Commands</a>
    </div>
  </nav>
</div>

<div class="container" id="app">
  <div class="cards">
    <div class="card"><small>🟢 Online</small><h2 id="stat-nodes">—</h2></div>
    <div class="card"><small>🎯 Hit Rate</small><h2 id="stat-hitrate">—</h2></div>
    <div class="card"><small>📦 Blocks</small><h2 id="stat-blocks">—</h2></div>
    <div class="card"><small>🎮 Mode</small><h2 id="stat-mode">—</h2></div>
  </div>

  <div class="panel">
    <div class="panel-header">📋 Nodes</div>
    <table>
      <thead><tr>
        <th>Node</th><th>IP</th><th>GPU</th><th>Model</th><th>Cache</th><th>Hit Rate</th><th>Disks</th><th>Status</th><th></th>
      </tr></thead>
      <tbody id="nodes-tbody"><tr><td colspan="9" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
  <div class="footer">Auto-refresh 10s · Last: <span id="last-update">—</span></div>
</div>

<script>
async function load(){
  try{
    const r=await fetch('/api/v1/cluster/status');
    const d=await r.json();
    document.getElementById('stat-nodes').textContent=(d.online_nodes||0)+'/'+(d.total_nodes||0);
    document.getElementById('stat-hitrate').textContent=(d.hit_rate||0).toFixed(1)+'%';
    document.getElementById('stat-blocks').textContent=(d.total_blocks||0).toLocaleString();
    document.getElementById('stat-mode').textContent=d.cache_mode||'—';
    document.getElementById('last-update').textContent=new Date().toLocaleTimeString();
    const tb=document.getElementById('nodes-tbody');
    if(!d.nodes||!d.nodes.length){tb.innerHTML='<tr><td colspan="9" class="empty">Waiting for C端 agents...</td></tr>';return}
    tb.innerHTML=d.nodes.map(n=>'<tr><td>'+esc(n.node_id)+'</td><td>'+esc(n.ip)+'</td><td>'+(n.gpu_util*100).toFixed(0)+'%</td><td>'+(n.model_name||'—')+'</td><td>'+(n.cache_blocks||0).toLocaleString()+'</td><td>'+(n.hit_rate||0).toFixed(1)+'%</td><td>'+(n.disks||[]).map(d=>'<div class="disk-mini">'+esc(d.path)+': '+(d.free_gb/1024).toFixed(1)+'TB free</div>').join('')+'</td><td><span class="tag '+n.status+'">'+n.status+'</span></td><td><a href="/node.html?id='+encodeURIComponent(n.node_id)+'" class="btn" style="padding:4px 10px;font-size:.75rem">detail</a></td></tr>').join('');
  }catch(e){console.error(e)}
}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
load();setInterval(load,10000);
</script>
</body>
</html>
