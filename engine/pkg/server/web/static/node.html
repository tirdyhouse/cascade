<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KV Cache Cluster - Node Detail</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e0e0e0;padding:20px}
.container{max-width:1400px;margin:0 auto}
nav{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #1e2a3a;margin-bottom:24px}
nav .logo{font-size:1.2rem;font-weight:700;color:#58a6ff}
nav a{color:#8b949e;text-decoration:none;padding:6px 14px;border-radius:6px;font-size:0.9rem}
nav a.active,nav a:hover{color:#fff;background:#1e2a3a}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#111b2e;border:1px solid #1e2a3a;border-radius:10px;padding:20px;text-align:center}
.card small{color:#8b949e;font-size:0.8rem}
.card h3{margin:8px 0 0;color:#f0f6fc}
.panel{background:#111b2e;border:1px solid #1e2a3a;border-radius:10px;overflow:hidden;margin-bottom:24px}
.panel-header{padding:14px 20px;border-bottom:1px solid #1e2a3a;font-weight:600;color:#f0f6fc}
table{width:100%;border-collapse:collapse;font-size:0.9rem}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #1a2538}
th{color:#8b949e;font-weight:600;font-size:0.8rem;text-transform:uppercase}
tr:hover{background:#162033}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.75rem;font-weight:600}
.tag.online,.tag.running,.tag.success{background:#0d4420;color:#7ee8a0}
.tag.offline,.tag.stopped,.tag.error,.tag.failed{background:#441d0d;color:#f7a072}
.tag.loading{background:#443d0d;color:#f0d76e}
.disk-bar{margin-bottom:12px}
.disk-label{display:flex;justify-content:space-between;font-size:0.85rem;margin-bottom:4px;color:#8b949e}
progress{width:100%;height:12px;border-radius:6px}
progress::-webkit-progress-bar{background:#1a2538;border-radius:6px}
progress::-webkit-progress-value{background:#1f6feb;border-radius:6px}
.empty{text-align:center;padding:40px;color:#8b949e}
a{color:#58a6ff;text-decoration:none}
a:hover{text-decoration:underline}
hgroup{margin-bottom:20px}
hgroup h2{color:#f0f6fc}
hgroup p{color:#8b949e;font-size:0.9rem}
</style>
</head>
<body>
<div class="container">
  <nav>
    <div class="logo">⚡ KV Cache Cluster Manager</div>
    <div>
      <a href="/">Dashboard</a>
      <a href="/nodes.html" class="active">Nodes</a>
      <a href="/cache.html">Cache</a>
      <a href="/commands.html">Commands</a>
    </div>
  </nav>
  <a href="/nodes.html">← Back to Nodes</a>
  <div id="app"></div>
</div>
<script>
async function load(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){document.getElementById('app').innerHTML='<div class="empty">No node ID specified</div>';return}
  try{
    const r=await fetch('/api/v1/nodes/'+encodeURIComponent(id));
    const d=await r.json();
    if(!d||!d.info){document.getElementById('app').innerHTML='<div class="empty">Node not found</div>';return}
    const st=d.status||{};
    document.getElementById('app').innerHTML=
      '<hgroup><h2>'+esc(d.info.node_id)+'</h2><p>'+esc(d.info.ip)+':'+d.info.rpc_port+' · '+esc(d.info.gpu_type)+' ×'+d.info.gpu_count+' · '+(d.info.cache_mode||'—')+'</p></hgroup>'+
      '<div class="cards">'+
        '<div class="card"><small>GPU</small><h3>'+(d.info.gpu_type||'—')+'</h3></div>'+
        '<div class="card"><small>GPU Mem</small><h3>'+(d.info.gpu_mem_mb?(d.info.gpu_mem_mb/1024).toFixed(0)+'GB':'—')+'</h3></div>'+
        '<div class="card"><small>Cache Mode</small><h3>'+(d.info.cache_mode||'—')+'</h3></div>'+
        '<div class="card"><small>Status</small><h3><span class="tag '+(st.vllm_status||'unknown')+'">'+(st.vllm_status||'unknown')+'</span></h3></div>'+
      '</div>'+
      '<div class="panel"><div class="panel-header">💾 Disks</div><div style="padding:20px">'+
        (d.info.disks||[]).map(di=>'<div class="disk-bar"><div class="disk-label"><span>'+esc(di.path)+'</span><span>'+di.total_gb+'GB total, '+di.free_gb+'GB free</span></div><progress value="'+(di.total_gb-di.free_gb)+'" max="'+di.total_gb+'"></progress></div>').join('')+
      '</div></div>'+
      '<div class="panel"><div class="panel-header">📊 KV Cache</div><div class="cards" style="padding:20px;margin:0">'+
        '<div class="card"><small>Blocks</small><h3>'+(st.cache_blocks||0).toLocaleString()+'</h3></div>'+
        '<div class="card"><small>Size</small><h3>'+fmtBytes(st.cache_bytes||0)+'</h3></div>'+
        '<div class="card"><small>Hit Rate</small><h3>'+(st.cache_hit_rate||0).toFixed(1)+'%</h3></div>'+
        '<div class="card"><small>Queue</small><h3>'+(st.queue_len||0)+'</h3></div>'+
      '</div></div>'+
      (d.recent&&d.recent.length?'<div class="panel"><div class="panel-header">📜 Recent Commands</div><table><thead><tr><th>Cmd ID</th><th>Status</th><th>Output</th></tr></thead><tbody>'+
        d.recent.map(c=>'<tr><td class="mono">'+esc(c.cmd_id)+'</td><td><span class="tag '+c.status+'">'+c.status+'</span></td><td>'+esc((c.output||'').slice(0,80))+'</td></tr>').join('')+
      '</tbody></table></div>':'');
  }catch(e){document.getElementById('app').innerHTML='<div class="empty">Error: '+e.message+'</div>'}
}
function fmtBytes(b){if(!b)return'0';const u=['B','KB','MB','GB','TB'];let i=0;let v=b;while(v>=1024&&i<u.length-1){v/=1024;i++}return v.toFixed(1)+u[i]}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
load();
</script>
</body>
</html>
