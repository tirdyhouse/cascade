<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KV Cache Cluster - Nodes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e0e0e0;padding:20px}
.container{max-width:1400px;margin:0 auto}
nav{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #1e2a3a;margin-bottom:24px}
nav .logo{font-size:1.2rem;font-weight:700;color:#58a6ff}
nav a{color:#8b949e;text-decoration:none;padding:6px 14px;border-radius:6px;font-size:0.9rem}
nav a.active,nav a:hover{color:#fff;background:#1e2a3a}
.panel{background:#111b2e;border:1px solid #1e2a3a;border-radius:10px;overflow:hidden;margin-bottom:24px}
.panel-header{padding:14px 20px;border-bottom:1px solid #1e2a3a;font-weight:600;color:#f0f6fc}
table{width:100%;border-collapse:collapse;font-size:0.9rem}
th,td{padding:10px 14px;text-align:left;border-bottom:1px solid #1a2538}
th{color:#8b949e;font-weight:600;font-size:0.8rem;text-transform:uppercase}
tr:hover{background:#162033}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.75rem;font-weight:600}
.tag.online,.tag.running,.tag.success{background:#0d4420;color:#7ee8a0}
.tag.offline,.tag.stopped,.tag.error,.tag.failed{background:#441d0d;color:#f7a072}
.tag.loading{background:#443d0d;color:#f0d76e}
.disk-mini{font-size:0.75rem;color:#8b949e;white-space:nowrap}
.empty{text-align:center;padding:40px;color:#8b949e}
hgroup{margin-bottom:20px}
hgroup h2{color:#f0f6fc}
hgroup p{color:#8b949e;font-size:0.9rem}
a{color:#58a6ff;text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="container">
  <nav>
    <div class="logo">⚡ KV Cache Cluster Manager</div>
    <div>
      <a href="/">Dashboard</a>
      <a href="/nodes.html" class="active">Nodes</a>
      <a href="/cache.html">Cache</a>
      <a href="/commands.html">Commands</a>
    </div>
  </nav>
  <hgroup><h2>📋 All Nodes</h2><p>Registered C端 agents in the cluster</p></hgroup>
  <div class="panel">
    <table>
      <thead><tr>
        <th>Node ID</th><th>IP</th><th>GPU</th><th>GPU Mem</th><th>Model</th>
        <th>vLLM</th><th>Cache</th><th>Hit Rate</th><th>Disks</th><th>Last Seen</th><th>Status</th>
      </tr></thead>
      <tbody id="nodes-tbody"><tr><td colspan="11" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
</div>
<script>
async function load(){
  try{
    const r=await fetch('/api/v1/nodes');
    const nodes=await r.json();
    const tb=document.getElementById('nodes-tbody');
    if(!nodes||!nodes.length){tb.innerHTML='<tr><td colspan="11" class="empty">No nodes registered.</td></tr>';return}
    tb.innerHTML=nodes.map(n=>'<tr><td><a href="/node.html?id='+encodeURIComponent(n.node_id)+'">'+esc(n.node_id)+'</a></td><td>'+esc(n.ip)+'</td><td>'+(n.gpu_util*100).toFixed(0)+'%</td><td>'+(n.gpu_mem_used?(n.gpu_mem_used/1024).toFixed(1)+'GB':'—')+'</td><td>'+(n.model_name||'—')+'</td><td><span class="tag '+n.status+'">'+n.status+'</span></td><td>'+(n.cache_blocks||0).toLocaleString()+'</td><td>'+(n.hit_rate||0).toFixed(1)+'%</td><td>'+(n.disks||[]).map(d=>'<div class="disk-mini">'+esc(d.path)+': free '+(d.free_gb/1024).toFixed(1)+'TB</div>').join('')+'</td><td>'+lastSeen(n.last_seen)+'</td><td><span class="tag '+n.status+'">'+n.status+'</span></td></tr>').join('');
  }catch(e){console.error(e)}
}
function lastSeen(ns){if(!ns)return'—';const s=Math.floor((Date.now()-ns/1e6)/1000);if(s<10)return'now';if(s<60)return s+'s';return Math.floor(s/60)+'m'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
load();
</script>
</body>
</html>
